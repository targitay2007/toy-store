<!-- Product Quick View Modal -->
<div class="modal" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="productModalLabel">Быстрый просмотр товара</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <img src="" id="modalProductImage" class="img-fluid rounded" alt="Product image">
                    </div>
                    <div class="col-md-6">
                        <h3 id="modalProductTitle"></h3>
                        <div class="rating" id="modalProductRating"></div>
                        <p class="price" id="modalProductPrice"></p>
                        <p id="modalProductDescription">Описание продукта будет здесь...</p>
                        <div class="mt-4">
                            <button type="button" class="btn btn-outline me-2">
                                <i class="fas fa-eye"></i> Подробнее
                            </button>
                            <button type="button" class="btn btn-primary">
                                <i class="fas fa-shopping-cart"></i> В корзину
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
